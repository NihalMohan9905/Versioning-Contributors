<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        canvas {
            border: 1px solid #000;
            display: block;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <script>
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        document.body.appendChild(canvas);

        const cellSize = 20;
        const canvasSize = 400;

        canvas.width = canvasSize;
        canvas.height = canvasSize;

        const snake = [{ x: 10, y: 10 }];
        let food = {};
        let score = 0;
        let direction = 'right';

        function drawSnake() {
            ctx.fillStyle = '#00f';
            snake.forEach(segment => {
                ctx.fillRect(segment.x * cellSize, segment.y * cellSize, cellSize, cellSize);
            });
        }

        function drawFood() {
            ctx.fillStyle = '#f00';
            ctx.fillRect(food.x * cellSize, food.y * cellSize, cellSize, cellSize);
        }

        function drawScore() {
            ctx.fillStyle = '#000';
            ctx.font = '20px Arial';
            ctx.fillText(Score: ${score}, 10, 20);
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * (canvasSize / cellSize)),
                y: Math.floor(Math.random() * (canvasSize / cellSize))
            };

            // Ensure the food is not generated on the snake
            while (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
                food = {
                    x: Math.floor(Math.random() * (canvasSize / cellSize)),
                    y: Math.floor(Math.random() * (canvasSize / cellSize))
                };
            }
        }

        function move() {
            const head = { ...snake[0] };

            switch (direction) {
                case 'up':
                    head.y--;
                    break;
                case 'down':
                    head.y++;
                    break;
                case 'left':
                    head.x--;
                    break;
                case 'right':
                    head.x++;
                    break;
            }

            // Check for collisions with walls or itself
            if (head.x < 0 || head.x >= canvasSize / cellSize || head.y < 0 || head.y >= canvasSize / cellSize || checkCollision(head)) {
                endGame();
                return;
            }

            // Check for food
            if (head.x === food.x && head.y === food.y) {
                score++;
                generateFood();
            } else {
                // Remove the last segment if not eating food
                snake.pop();
            }

            // Move the head to the front
            snake.unshift(head);

            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw elements
            drawSnake();
            drawFood();
            drawScore();
        }

        function checkCollision(head) {
            return snake.some(segment => segment.x === head.x && segment.y === head.y);
        }

        function endGame() {
            alert(Game Over! Your score: ${score});
            resetGame();
        }

        function resetGame() {
            snake.length = 1;
            direction = 'right';
            score = 0;
            generateFood();
        }

        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'ArrowUp':
                    direction = 'up';
                    break;
                case 'ArrowDown':
                    direction = 'down';
                    break;
                case 'ArrowLeft':
                    direction = 'left';
                    break;
                case 'ArrowRight':
                    direction = 'right';
                    break;
            }
        });

        generateFood();
        setInterval(move, 200);
    </script>
</body>
</html>
